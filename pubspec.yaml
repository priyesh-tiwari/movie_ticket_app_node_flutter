name: movie_flutter_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  cached_network_image: ^3.4.1
  youtube_player_flutter: ^9.1.3
  flutter_screenutil: ^5.9.3
  flutter_stripe: ^9.6.0
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/splash_01.png"
  adaptive_icon_background: "#C47F00"
  adaptive_icon_foreground: "assets/splash_01.png"

flutter_native_splash:
  color: "#3D2700"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/splash.png
    - assets/splash_01.png